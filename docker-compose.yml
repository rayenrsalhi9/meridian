services:
  postgres:
    image: postgres:17-alpine
    container_name: meridian_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meridian}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-meridian_dev}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - meridian_pgdata:/var/lib/postgresql/data

  postgres_test:
    image: postgres:17-alpine
    container_name: meridian_postgres_test
    restart: "no"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meridian}
      POSTGRES_PASSWORD: ${POSTGRES_TEST_PASSWORD:-changeme}
      POSTGRES_DB: meridian_test
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - meridian_pgdata_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meridian -d meridian_test"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  meridian_pgdata:
  meridian_pgdata_test:

services:
  postgres:
    image: postgres:17-alpine
    container_name: meridian_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meridian}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-meridian_dev}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - meridian_pgdata:/var/lib/postgresql/data

volumes:
  meridian_pgdata:
